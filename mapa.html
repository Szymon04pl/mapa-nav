<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no" />
  <title>Mapa</title>

  <!-- LEAFLET CDN — zastąp lokalnymi plikami dla trybu offline -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- TURF.JS CDN — obliczenia geometryczne -->
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Helvetica Neue', Arial, sans-serif;
      background: #0f172a;
    }

    /* ─── MAPA ─── */
    #map { position: fixed; inset: 0; z-index: 1; background: #1e293b; }

    /* ─── WYSZUKIWARKA (góra) ─── */
    #search-wrap {
      position: fixed;
      top: max(env(safe-area-inset-top, 0px), 12px);
      left: 12px; right: 12px;
      z-index: 1000;
    }
    #search-bar {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.97);
      border-radius: 16px;
      padding: 10px 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.28);
      transition: border-radius 0.2s;
    }
    #search-bar.open { border-radius: 16px 16px 0 0; }
    .search-icon { color: #64748b; flex-shrink: 0; }
    #search-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-size: 15px; color: #0f172a; font-family: inherit; min-width: 0;
    }
    #search-input::placeholder { color: #94a3b8; }
    #search-clear {
      background: none; border: none; cursor: pointer;
      color: #94a3b8; padding: 2px; display: none; line-height: 1;
    }
    #search-clear.show { display: block; }

    /* ─── PANEL WYNIKÓW ─── */
    #search-panel {
      background: rgba(255,255,255,0.97);
      border-radius: 0 0 16px 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      display: none; overflow: hidden;
      max-height: 55vh; overflow-y: auto;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    #search-panel.show { display: block; }
    .search-result {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      transition: background 0.12s;
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:active { background: rgba(0,0,0,0.05); }
    .sr-icon { color: #f97316; flex-shrink: 0; }
    .sr-icon.recent { color: #8b5cf6; }
    .sr-name  { font-size: 14px; font-weight: 600; color: #0f172a; }
    .sr-coord { font-size: 10px; color: #94a3b8; font-family: monospace; margin-top: 1px; }
    .search-empty { padding: 16px; text-align: center; color: #94a3b8; font-size: 13px; }

    /* Nagłówek sekcji w panelu */
    .search-section-header {
      padding: 8px 16px 4px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      color: #94a3b8; text-transform: uppercase;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      background: rgba(248,250,252,0.9);
    }

    /* Przycisk "Dodaj miejsce" wewnątrz panelu */
    #btn-panel-add {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: calc(100% - 24px); margin: 10px 12px 12px;
      padding: 13px; border: none; border-radius: 12px;
      background: linear-gradient(135deg,#f97316,#ea580c);
      color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.15s; flex-shrink: 0;
    }
    #btn-panel-add:active { opacity: 0.85; }

    /* ─── ZOOM (pod wyszukiwarką, prawa strona) ─── */
    #zoom-controls {
      position: fixed;
      top: calc(max(env(safe-area-inset-top, 0px), 12px) + 62px);
      right: 12px;
      z-index: 999;
      display: flex; flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }
    .zoom-btn {
      width: 36px; height: 36px;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.10);
      color: #e2e8f0; font-size: 20px; font-weight: 300;
      cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    .zoom-btn:first-child { border-bottom: 1px solid rgba(255,255,255,0.08); }
    .zoom-btn:active { background: rgba(37,99,235,0.40); }

    /* ─── GPS PILL (pod wyszukiwarką) ─── */
    #gps-pill {
      position: fixed;
      top: calc(max(env(safe-area-inset-top, 0px), 12px) + 62px);
      left: 12px;
      z-index: 999;
      display: none; align-items: center; gap: 6px;
      background: rgba(15,23,42,0.82);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(37,99,235,0.30);
      border-radius: 999px; padding: 5px 12px 5px 8px;
      color: #93c5fd; font-size: 11px; font-family: monospace;
      pointer-events: none;
    }
    #gps-pill.show { display: flex; }
    .gps-pill-dot {
      width: 7px; height: 7px; background: #3b82f6;
      border-radius: 50%; flex-shrink: 0;
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ─── WSKAZÓWKA ─── */
    #hint {
      position: fixed;
      top: calc(max(env(safe-area-inset-top, 0px), 12px) + 62px);
      left: 50%; transform: translateX(-50%);
      z-index: 998;
      background: rgba(15,23,42,0.78); color: #94a3b8;
      font-size: 11px; padding: 6px 14px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity 0.5s;
    }
    #hint.show { opacity: 1; }
    #hint.add-mode {
      opacity: 1; color: #fdba74;
      border-color: rgba(249,115,22,0.35);
      background: rgba(120,53,15,0.82);
    }

    /* ─── PRZYCISKI (dół) ─── */
    #controls {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom, 0px), 28px);
      left: 50%; transform: translateX(-50%);
      z-index: 1000;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      border: none; border-radius: 999px;
      font-family: inherit; font-weight: 600; cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    .btn:active  { transform: scale(0.94); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    #btn-locate {
      padding: 15px 30px; font-size: 16px; color: #fff;
      background: linear-gradient(135deg,#2563eb,#1d4ed8);
      box-shadow: 0 6px 28px rgba(37,99,235,0.50);
      transition: transform 0.12s, background 0.25s, box-shadow 0.25s;
    }
    #btn-locate.tracking {
      background: linear-gradient(135deg,#dc2626,#b91c1c);
      box-shadow: 0 6px 28px rgba(220,38,38,0.45);
    }
    #btn-center {
      padding: 11px 22px; font-size: 13px; color: #e2e8f0;
      background: rgba(15,23,42,0.80);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 4px 18px rgba(0,0,0,0.35); display: none;
    }
    #btn-clear-route {
      padding: 11px 22px; font-size: 13px; color: #93c5fd;
      background: rgba(15,23,42,0.82);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(37,99,235,0.30);
      box-shadow: 0 4px 18px rgba(0,0,0,0.35); display: none;
    }
    #btn-gps-retry {
      padding: 11px 22px; font-size: 13px; color: #fde68a;
      background: rgba(78,32,8,0.88);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(251,191,36,0.40);
      box-shadow: 0 4px 20px rgba(251,191,36,0.20);
      display: none;
      animation: gps-warn 2s ease-in-out infinite;
    }
    @keyframes gps-warn {
      0%,100% { box-shadow: 0 4px 20px rgba(251,191,36,0.20); border-color: rgba(251,191,36,0.40); }
      50%      { box-shadow: 0 4px 28px rgba(251,191,36,0.50); border-color: rgba(251,191,36,0.75); }
    }

    /* ─── GPS MARKER ─── */
    .gps-wrapper { position:relative; width:24px; height:24px; }
    .gps-dot {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:16px; height:16px; background:#2563eb; border:3px solid #fff;
      border-radius:50%; box-shadow:0 2px 10px rgba(37,99,235,0.55); z-index:2;
    }
    .gps-pulse {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:24px; height:24px; border-radius:50%;
      background:rgba(37,99,235,0.40); z-index:1;
      animation: pulse-ring 2.2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%  { transform:translate(-50%,-50%) scale(0.8); opacity:0.9; }
      70% { transform:translate(-50%,-50%) scale(3.0); opacity:0;   }
      100%{ transform:translate(-50%,-50%) scale(3.0); opacity:0;   }
    }

    /* ─── MARKER MIEJSCA ─── */
    .place-dot {
      width:16px; height:16px; background:#f97316; border:3px solid #fff;
      border-radius:50%; box-shadow:0 2px 10px rgba(249,115,22,0.55);
      cursor:pointer; transition:transform 0.15s;
    }
    .place-dot:hover { transform:scale(1.25); }

    /* ─── LEAFLET POPUP ─── */
    .leaflet-popup-content-wrapper {
      background:rgba(15,23,42,0.94) !important; color:#e2e8f0 !important;
      border-radius:14px !important; border:1px solid rgba(255,255,255,0.10) !important;
      box-shadow:0 8px 32px rgba(0,0,0,0.55) !important;
      backdrop-filter:blur(12px) !important; -webkit-backdrop-filter:blur(12px) !important;
      min-width:160px;
    }
    .leaflet-popup-tip { background:rgba(15,23,42,0.94) !important; }
    .leaflet-popup-close-button { color:#64748b !important; font-size:18px !important; top:8px !important; right:10px !important; }
    .leaflet-popup-content { margin:14px 16px !important; }
    .popup-name  { font-size:15px; font-weight:700; color:#f1f5f9; margin-bottom:3px; }
    .popup-coords{ font-size:10px; color:#475569; font-family:monospace; margin-bottom:12px; }
    .popup-nav {
      display:flex; align-items:center; justify-content:center; gap:6px;
      width:100%; padding:8px; border-radius:8px; cursor:pointer;
      background:rgba(37,99,235,0.12); border:1px solid rgba(37,99,235,0.28);
      color:#93c5fd; font-size:13px; font-weight:600;
      font-family:inherit; transition:background 0.2s; margin-bottom:8px;
    }
    .popup-nav:hover { background:rgba(37,99,235,0.24); }
    .popup-delete {
      display:flex; align-items:center; justify-content:center; gap:6px;
      width:100%; padding:8px; border-radius:8px; cursor:pointer;
      background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.25);
      color:#fca5a5; font-size:13px; font-weight:600;
      font-family:inherit; transition:background 0.2s;
    }
    .popup-delete:hover { background:rgba(239,68,68,0.22); }

    /* ─── MODAL dodaj miejsce ─── */
    #modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.55);
      z-index:2000; display:none; align-items:flex-end;
      backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    }
    #modal-overlay.show { display:flex; }
    #modal-panel {
      width:100%; background:#1e293b; border-radius:20px 20px 0 0;
      padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));
      border-top:1px solid rgba(255,255,255,0.10);
      animation:slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1);
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    #modal-handle { width:40px; height:4px; background:#334155; border-radius:2px; margin:0 auto 16px; }
    #modal-title  { font-size:18px; font-weight:700; color:#f1f5f9; margin-bottom:3px; }
    #modal-coords { font-size:11px; color:#475569; font-family:monospace; margin-bottom:16px; }
    #modal-input  {
      width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12);
      border-radius:12px; padding:14px 16px; font-size:16px; color:#f1f5f9; outline:none;
      margin-bottom:16px; font-family:inherit; transition:border-color 0.2s;
    }
    #modal-input:focus { border-color:#f97316; }
    #modal-input::placeholder { color:#334155; }
    #modal-btns { display:flex; gap:10px; }
    #modal-cancel {
      flex:1; padding:14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.10);
      border-radius:12px; color:#64748b; font-size:15px; font-weight:600;
      cursor:pointer; font-family:inherit; transition:background 0.2s;
    }
    #modal-save {
      flex:2; padding:14px; background:linear-gradient(135deg,#f97316,#ea580c); border:none;
      border-radius:12px; color:#fff; font-size:15px; font-weight:700;
      cursor:pointer; font-family:inherit;
    }
    #modal-save:disabled { opacity:0.5; cursor:not-allowed; }

    /* ─── CHECKBOX ZGODY ─── */
    #modal-consent {
      margin-bottom: 16px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
    }
    .consent-label {
      display: flex; gap: 10px; align-items: flex-start; cursor: pointer;
    }
    .consent-checkbox {
      flex-shrink: 0; margin-top: 3px;
      width: 16px; height: 16px; cursor: pointer;
      accent-color: #f97316;
    }
    .consent-text {
      font-size: 11.5px; color: #94a3b8; line-height: 1.6;
      user-select: none; -webkit-user-select: none;
    }
    .consent-link {
      color: #f97316; text-decoration: underline; text-underline-offset: 2px;
    }
    .consent-link.disabled {
      pointer-events: none; opacity: 0.5; text-decoration: none;
    }

    /* ─── TOAST ─── */
    #toast {
      position:fixed; bottom:130px; left:50%;
      transform:translateX(-50%) translateY(16px);
      background:rgba(15,23,42,0.92); color:#e2e8f0;
      padding:10px 20px; border-radius:999px;
      font-size:13px; font-weight:500; z-index:3000; opacity:0;
      transition:all 0.3s ease; border:1px solid rgba(255,255,255,0.08);
      pointer-events:none; white-space:nowrap;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    #toast.ok   { border-color:rgba(34,197,94,0.35); color:#86efac; }
    #toast.err  { border-color:rgba(239,68,68,0.35);  color:#fca5a5; }

    .spin { animation:spin 0.9s linear infinite; display:inline-block; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ─── LEAFLET OVERRIDES (ukryj domyślny zoom) ─── */
    .leaflet-control-attribution {
      font-size:9px !important; border-radius:6px 0 0 0 !important;
      background:rgba(15,23,42,0.72) !important; color:#475569 !important;
    }
    .leaflet-control-attribution a { color:#64748b !important; }
    .leaflet-control-zoom { display: none !important; }
  </style>
</head>
<body>

  <!-- ── Wyszukiwarka ── -->
  <div id="search-wrap">
    <div id="search-bar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="text" placeholder="Szukaj miejsca…"
             autocomplete="off" autocorrect="off" spellcheck="false" />
      <button id="search-clear" aria-label="Wyczyść">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="search-panel">
      <!-- wyniki wyszukiwania wypełniane dynamicznie -->
      <button id="btn-panel-add">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Dodaj nowe miejsce
      </button>
    </div>
  </div>

  <!-- ── Przyciski zoom (pod wyszukiwarką, prawa strona) ── -->
  <div id="zoom-controls">
    <button class="zoom-btn" id="btn-zoom-in" aria-label="Przybliż">+</button>
    <button class="zoom-btn" id="btn-zoom-out" aria-label="Oddal">−</button>
  </div>

  <!-- ── GPS pill ── -->
  <div id="gps-pill">
    <span class="gps-pill-dot"></span>
    <span id="gps-pill-text"></span>
  </div>

  <!-- ── Wskazówka trybu dodawania ── -->
  <div id="hint"></div>

  <!-- ── Mapa ── -->
  <div id="map"></div>

  <!-- ── Przyciski dolne ── -->
  <div id="controls">
    <button class="btn" id="btn-locate">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5" fill="white" stroke="none"/>
      </svg>
      Gdzie jestem?
    </button>
    <button class="btn" id="btn-center">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
      </svg>
      Centruj na mnie
    </button>
    <button class="btn" id="btn-gps-retry">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
        <path d="M16 16h5v5"/>
      </svg>
      Odśwież GPS
    </button>
    <button class="btn" id="btn-clear-route">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      Wyczyść trasę
    </button>
  </div>

  <!-- ── Modal: dodaj miejsce ── -->
  <div id="modal-overlay">
    <div id="modal-panel">
      <div id="modal-handle"></div>
      <div id="modal-title">📍 Dodaj miejsce</div>
      <div id="modal-coords"></div>
      <input id="modal-input" type="text" placeholder="Wpisz nazwę miejsca…"
             maxlength="80" autocomplete="off" />
      <div id="modal-consent">
        <label class="consent-label">
          <input type="checkbox" id="modal-checkbox" class="consent-checkbox" />
          <span class="consent-text">
            Dodając wpis, pomagasz innym odnaleźć ich bliskich. Dbamy o Twoją prywatność.
            Twój adres IP jest zatajony (bezpieczny hash) i służy jedynie ochronie przed nadużyciami.
            Klikając „Wyślij", akceptujesz naszą
            <a id="consent-policy-link" href="#" target="_blank" rel="noopener noreferrer"
               class="consent-link">Politykę Prywatności</a>.
          </span>
        </label>
      </div>
      <div id="modal-btns">
        <button id="modal-cancel">Anuluj</button>
        <button id="modal-save">💾 Wyślij</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div id="toast"></div>

  <script>
  // ╔══════════════════════════════════════════════════════════════════╗
  // ║  KONFIGURACJA MAPY                                               ║
  // ╚══════════════════════════════════════════════════════════════════╝
  const CFG = {
    imageFile:   'mapa.jpg',
    imageBounds: [
      [52.88182112013122, 21.0908532075908],   // Południowo-Zachodni narożnik (dolny lewy)

  // ════════════════════════════════════════════════════════════════════

  // ════════════════════════════════════════════════════════════════════
  //  OSTATNIO ODWIEDZONE MIEJSCA (localStorage, max 4)
  // ════════════════════════════════════════════════════════════════════
  var RECENT_KEY = 'map_recent_places_v1';

  function getRecentIds() {
    try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; }
    catch(e) { return []; }
  }

  function addRecentId(id) {
    var ids = getRecentIds().filter(function(i) { return i !== id; });
    ids.unshift(id);
    if (ids.length > 4) ids = ids.slice(0, 4);
    try { localStorage.setItem(RECENT_KEY, JSON.stringify(ids)); } catch(e) {}
  }

  function getRecentPlaces() {
    var ids = getRecentIds();
    return ids
      .map(function(id) { return allPlaces.find(function(p) { return p.id === id; }); })
      .filter(Boolean)
      .slice(0, 4);
  }

  // ════════════════════════════════════════════════════════════════════
  //  WYSZUKIWARKA
  // ════════════════════════════════════════════════════════════════════
  function openSearchPanel() {
    searchBar.classList.add('open');
    searchPanel.classList.add('show');
    renderSearchResults(searchInput.value);
  }
  function closeSearchPanel() {
    searchBar.classList.remove('open');
    searchPanel.classList.remove('show');
    searchInput.blur();
  }

  function makeResultEl(place, isRecent) {
    var el = document.createElement('div');
    el.className = 'search-result';

    var iconSvg = isRecent
      ? '<svg class="sr-icon recent" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
      : '<svg class="sr-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>';

    el.innerHTML =
      iconSvg +
      '<div><div class="sr-name">' + place.name.replace(/</g,'&lt;') + '</div>' +
      '<div class="sr-coord">' + place.lat.toFixed(5) + ', ' + place.lng.toFixed(5) + '</div></div>';

    el.addEventListener('click', function() {
      closeSearchPanel();
      map.setView([place.lat, place.lng], 19, { animate: true });
      if (placeMarkers[place.id]) {
        // openPopup wywoła popupopen → setDeepLink + addRecentId automatycznie
        setTimeout(function() { placeMarkers[place.id].openPopup(); }, 400);
      }
    });
    return el;
  }

  function renderSearchResults(query) {
    // Usuń stare wyniki (zachowaj btn-panel-add i nagłówki)
    Array.from(searchPanel.querySelectorAll('.search-result, .search-empty, .search-section-header'))
      .forEach(function(el) { el.remove(); });

    var q = query.trim().toLowerCase();

    if (!q) {
      // ── Tryb "ostatnio odwiedzone" ──
      var recent = getRecentPlaces();
      if (recent.length > 0) {
        var hdr = document.createElement('div');
        hdr.className = 'search-section-header';
        hdr.textContent = '🕐 Ostatnio odwiedzone';
        searchPanel.insertBefore(hdr, btnPanelAdd);
        recent.forEach(function(place) {
          searchPanel.insertBefore(makeResultEl(place, true), btnPanelAdd);
        });
      } else {
        var empty = document.createElement('div');
        empty.className = 'search-empty';
        empty.textContent = 'Brak ostatnio odwiedzanych miejsc';
        searchPanel.insertBefore(empty, btnPanelAdd);
      }
    } else {
      // ── Tryb wyszukiwania ──
      var filtered = allPlaces.filter(function(p) {
        return p.name.toLowerCase().includes(q);
      });

      if (filtered.length === 0) {
        var empty2 = document.createElement('div');
        empty2.className = 'search-empty';
        empty2.textContent = 'Brak wyników dla „' + query + '"';
        searchPanel.insertBefore(empty2, btnPanelAdd);
      } else {
        filtered.forEach(function(place) {
          searchPanel.insertBefore(makeResultEl(place, false), btnPanelAdd);
        });
      }
    }
  }

  searchInput.addEventListener('focus', function() { openSearchPanel(); });
  searchInput.addEventListener('input', function() {

    searchClear.classList.toggle('show', searchInput.value.length > 0);

  searchClear.addEventListener('click', function() {

  modalCancel.addEventListener('click', hideModal);

  // ════════════════════════════════════════════════════════════════════
  //  GPS
  // ════════════════════════════════════════════════════════════════════
  const gpsIcon = L.divIcon({
    className:'', iconSize:[24,24], iconAnchor:[12,12],
    html:'<div class="gps-wrapper"><div class="gps-pulse"></div><div class="gps-dot"></div></div>',
  });

  // ── Przycisk odświeżania GPS ──
  function showGpsRetry() {
    btnGpsRetry.style.display = 'flex';
  }
  function hideGpsRetry() {
    btnGpsRetry.style.display = 'none';
    if (gpsRetryTimer !== null) { clearTimeout(gpsRetryTimer); gpsRetryTimer = null; }
  }

  function setLocateIdle() {
    btnLocate.classList.remove('tracking');
    btnLocate.disabled = false;
    btnLocate.innerHTML =
      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">' +
      '<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>' +
      '<circle cx="12" cy="9" r="2.5" fill="white" stroke="none"/></svg> Gdzie jestem?';
  }
  function setLocateTracking() {
    btnLocate.classList.add('tracking');
    btnLocate.disabled = false;
    btnLocate.innerHTML =
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">' +
      '<rect x="6" y="6" width="12" height="12" rx="2"/></svg> Zatrzymaj śledzenie';
  }

  function updateMarker(lat, lng, accuracy) {
    hideGpsRetry();   // GPS namierzył — ukryj przycisk odświeżania
    userLat = lat; userLng = lng;
    var acc = accuracy < 1000 ? '±' + Math.round(accuracy) + ' m' : '±' + (accuracy/1000).toFixed(1) + ' km';
    gpsPill.classList.add('show');
    gpsPillText.textContent = lat.toFixed(5) + ', ' + lng.toFixed(5) + '  ' + acc;

    if (gpsMarker) {
      gpsMarker.setLatLng([lat, lng]);
      accCircle.setLatLng([lat, lng]).setRadius(accuracy);
    } else {
      gpsMarker = L.marker([lat, lng], { icon: gpsIcon, zIndexOffset: 1000 }).addTo(map);
      accCircle  = L.circle([lat, lng], { radius: accuracy, color:'#2563eb', fillColor:'#93c5fd', fillOpacity:0.15, weight:1.5 }).addTo(map);
      map.setView([lat, lng], 18);
      btnCenter.style.display = 'flex';
      isTracking = true;
      setLocateTracking();
    }
  }

  function stopTracking() {
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    isTracking = false;
    hideGpsRetry();
    // Usuń marker i okrąg z mapy i wyzeruj referencje,
    // żeby następne wywołanie updateMarker() mogło poprawnie odtworzyć śledzenie
    if (gpsMarker)  { map.removeLayer(gpsMarker);  gpsMarker  = null; }
    if (accCircle)  { map.removeLayer(accCircle);   accCircle  = null; }
    userLat = null; userLng = null;
    btnCenter.style.display = 'none';
    gpsPill.classList.remove('show');
    setLocateIdle();
  }

  // Wyodrębniona logika startu GPS (używana też przez przycisk odświeżania)
  function startLocating() {
    if (!navigator.geolocation) { showToast('⚠ Geolokalizacja nieobsługiwana', 'err'); return; }

    hideGpsRetry();   // wyczyść poprzedni timer/przycisk

    btnLocate.disabled = true;
    btnLocate.innerHTML =
      '<span class="spin"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
      '<path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></span> Namierzam…';

    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }

    // ── Timer 5 sek. — pokaż przycisk odświeżania jeśli GPS się nie łączy ──
    gpsRetryTimer = setTimeout(function() {
      gpsRetryTimer = null;
      showGpsRetry();
    }, 5000);

    navigator.geolocation.getCurrentPosition(function(pos) {
      updateMarker(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
      watchId = navigator.geolocation.watchPosition(
        function(p) { updateMarker(p.coords.latitude, p.coords.longitude, p.coords.accuracy); },
        function(err) { showToast('⚠ GPS: ' + (err.code === 1 ? 'brak zgody' : err.message), 'err'); },
        { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
      );
    }, function(err) {
      hideGpsRetry();
      btnLocate.disabled = false; setLocateIdle();
      var msg = { 1:'Brak zgody na lokalizację', 2:'Pozycja niedostępna', 3:'Przekroczono czas' };
      showToast('⚠ ' + (msg[err.code] || err.message), 'err');
    }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
  }

  btnLocate.addEventListener('click', function() {
    if (isTracking) { stopTracking(); return; }
    startLocating();
  });

  // Przycisk odświeżania GPS — restartuje szukanie od nowa
  btnGpsRetry.addEventListener('click', function() {
    hideGpsRetry();
    startLocating();
  });

  btnCenter.addEventListener('click', function() {
    if (userLat !== null) map.setView([userLat, userLng], map.getZoom(), { animate: true });
  });

  // ════════════════════════════════════════════════════════════════════
  //  AIRTABLE
  // ════════════════════════════════════════════════════════════════════
  async function initFields() {
    for (var fn of ['lat','lng']) {
      await fetch(AT.metaUrl, {
        method:'POST', headers:AT.h,
        body:JSON.stringify({ name:fn, type:'number', options:{ precision:8 } }),
      }).catch(function(){});
    }
    // Utwórz pole hasha IP (jeśli nie istnieje; Airtable ignoruje duplikaty)
    await fetch(AT.metaUrl, {
      method:'POST', headers:AT.h,
      body:JSON.stringify({ name:'kto-dodał-nagrobek?', type:'singleLineText' }),
    }).catch(function(){});
  }
  async function fetchPlaces() {
    var res  = await fetch(AT.url + '?maxRecords=200', { headers: AT.h });
    var data = await res.json();
    if (!res.ok) throw new Error((data.error && data.error.message) || 'Błąd Airtable');
    return (data.records || [])
      .filter(function(r) { return r.fields.lat != null && r.fields.lng != null; })
      .map(function(r) { return {
        id:   r.id,
        name: String(r.fields.miejsce || '(bez nazwy)'),
        lat:  Number(r.fields.lat),
        lng:  Number(r.fields.lng),
      }; });
  }
  async function createPlace(name, lat, lng) {
    // ── Ścieżka przez Cloudflare Worker (hashuje IP + zapisuje do Airtable) ──
    if (CFG.workerUrl) {
      var res  = await fetch(CFG.workerUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, lat: lat, lng: lng }),
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Błąd workera');
      return { id: data.id, name: data.name, lat: data.lat, lng: data.lng };
    }

    // ── Fallback: bezpośrednio do Airtable gdy worker nie jest skonfigurowany ──
    console.warn('[AT] CFG.workerUrl pusty — zapis bez hasha IP');
    var res2  = await fetch(AT.url, {
      method:'POST', headers:AT.h,
      body:JSON.stringify({ records:[{ fields:{ miejsce:name, lat:lat, lng:lng } }] }),
    });
    var data2 = await res2.json();
    if (!res2.ok) throw new Error((data2.error && data2.error.message) || 'Błąd zapisu');
    var r = data2.records[0];
    return { id:r.id, name:r.fields.miejsce||name, lat:r.fields.lat||lat, lng:r.fields.lng||lng };
  }
  async function destroyPlace(id) {
    var res = await fetch(AT.url + '/' + id, { method:'DELETE', headers:AT.h });
    if (!res.ok) throw new Error('Błąd usuwania');
  }

  // ════════════════════════════════════════════════════════════════════
  //  MARKERY MIEJSC
  // ════════════════════════════════════════════════════════════════════
  function renderPlace(place) {
    if (placeMarkers[place.id]) map.removeLayer(placeMarkers[place.id]);
    var icon = L.divIcon({
      className:'', iconSize:[16,16], iconAnchor:[8,8], popupAnchor:[0,-12],
      html:'<div class="place-dot"></div>',
    });
    var marker = L.marker([place.lat, place.lng], { icon: icon }).addTo(map);
    var safe = place.name.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    marker.bindPopup(
      '<div class="popup-name">' + safe + '</div>' +
      '<div class="popup-coords">' + place.lat.toFixed(5) + ', ' + place.lng.toFixed(5) + '</div>' +
      '<button class="popup-nav" onclick="handleNavigate(' + place.lng.toFixed(7) + ',' + place.lat.toFixed(7) + ',\'' + place.id + '\')">🧭 Nawiguj tutaj</button>' +
      '<button class="popup-delete" onclick="handleDelete(\'' + place.id + '\')">🗑 Usuń miejsce</button>',
      { maxWidth: 220 }
    );
    // Deep link — ustaw ?id= gdy popup się otwiera, wyczyść gdy się zamyka
    marker.on('popupopen', function() {
      addRecentId(place.id);
      setDeepLink(place.id);
    });
    marker.on('popupclose', function() {
      clearDeepLink();
    });
    placeMarkers[place.id] = marker;
  }

  window.handleDelete = async function(id) {
    try {
      await destroyPlace(id);
      if (placeMarkers[id]) { map.removeLayer(placeMarkers[id]); delete placeMarkers[id]; }
      allPlaces = allPlaces.filter(function(p) { return p.id !== id; });
      map.closePopup();
      clearDeepLink();   // wyczyść URL jeśli usunięte miejsce było w linku
      showToast('✓ Usunięto miejsce', 'ok');
    } catch(e) { showToast('⚠ Błąd: ' + e.message, 'err'); }
  };

  async function loadPlaces() {
    try {
      var places = await fetchPlaces();
      Object.values(placeMarkers).forEach(function(m) { map.removeLayer(m); });
      Object.keys(placeMarkers).forEach(function(k) { delete placeMarkers[k]; });
      allPlaces = places;
      places.forEach(renderPlace);
    } catch(e) { showToast('⚠ Błąd ładowania: ' + e.message, 'err'); }
  }
  setInterval(loadPlaces, 30000);

  // ════════════════════════════════════════════════════════════════════
  //  NAWIGACJA — HYBRYDOWY ALGORYTM (SIEĆ DRÓG + LINIA PROSTA)
  // ════════════════════════════════════════════════════════════════════
  var roadGraph   = null;
  var routeLayers = [];

  function insertPointIntoLine(coords, pt) {
    var bestIdx = 0, bestDist = Infinity;
    for (var i = 0; i < coords.length - 1; i++) {
      try {
        var snap = turf.nearestPointOnLine(
          turf.lineString([coords[i], coords[i+1]]), turf.point(pt)
        );
        if (snap.properties.dist < bestDist) { bestDist = snap.properties.dist; bestIdx = i; }
      } catch(e) {}
    }
    var T = 0.00008;
    var nA = coords[bestIdx], nearA = Math.abs(nA[0]-pt[0])<T && Math.abs(nA[1]-pt[1])<T;
    var nB = coords[bestIdx+1], nearB = nB && Math.abs(nB[0]-pt[0])<T && Math.abs(nB[1]-pt[1])<T;
    if (!nearA && !nearB) coords.splice(bestIdx+1, 0, [pt[0], pt[1]]);
  }

  function buildRoadGraph(geojson) {
    var lines     = geojson.features.filter(function(f) { return f.geometry.type === 'LineString'; });
    var lineCoords = lines.map(function(l) { return l.geometry.coordinates.map(function(c) { return [c[0],c[1]]; }); });
    for (var i = 0; i < lines.length; i++) {
      for (var j = i+1; j < lines.length; j++) {
        try {
          var ix = turf.lineIntersect(lines[i], lines[j]);
          ix.features.forEach(function(pt) {
            insertPointIntoLine(lineCoords[i], pt.geometry.coordinates);
            insertPointIntoLine(lineCoords[j], pt.geometry.coordinates);
          });
        } catch(e) {}
      }
    }
    var SNAP = 0.00004, graph = {}, nodeCoords = {};
    function key(c) { return (Math.round(c[1]/SNAP)*SNAP).toFixed(6)+','+(Math.round(c[0]/SNAP)*SNAP).toFixed(6); }
    lineCoords.forEach(function(coords) {
      for (var k = 0; k < coords.length-1; k++) {
        var a=coords[k], b=coords[k+1], ka=key(a), kb=key(b);
        nodeCoords[ka]=a; nodeCoords[kb]=b;
        var d=turf.distance(turf.point(a),turf.point(b),{units:'meters'});
        if (d<0.1) continue;
        if (!graph[ka]) graph[ka]=[];
        if (!graph[kb]) graph[kb]=[];
        graph[ka].push({to:kb,dist:d}); graph[kb].push({to:ka,dist:d});
      }
    });
    return { graph, nodeCoords, key };
  }

  function dijkstra(startKey, endKey) {
    var g=roadGraph.graph, nc=roadGraph.nodeCoords;
    if (!g[startKey]||!g[endKey]) return null;
    if (startKey===endKey) return [nc[startKey]];
    var dist={}, prev={}, visited=new Set();
    Object.keys(g).forEach(function(k){ dist[k]=Infinity; });
    dist[startKey]=0;
    var queue=[{key:startKey,d:0}];
    while (queue.length) {
      queue.sort(function(a,b){ return a.d-b.d; });
      var u=queue.shift().key;
      if (visited.has(u)) continue; visited.add(u);
      if (u===endKey) break;
      (g[u]||[]).forEach(function(edge){
        var alt=dist[u]+edge.dist;
        if (alt<(dist[edge.to]!==undefined?dist[edge.to]:Infinity)) {
          dist[edge.to]=alt; prev[edge.to]=u; queue.push({key:edge.to,d:alt});
        }
      });
    }
    if (!isFinite(dist[endKey])) return null;
    var path=[], cur=endKey;
    while (cur) { path.unshift(nc[cur]); cur=prev[cur]||null; }
    return path;
  }

  function findNearestNode(coord) {
    var bestKey=null, bestDist=Infinity;
    Object.keys(roadGraph.nodeCoords).forEach(function(k){
      var d=turf.distance(turf.point(coord),turf.point(roadGraph.nodeCoords[k]),{units:'meters'});
      if (d<bestDist){ bestDist=d; bestKey=k; }
    });
    return { key:bestKey, coord:roadGraph.nodeCoords[bestKey], dist:bestDist };
  }

  function drawStraightRoute(from, to, label) {
    routeLayers.push(L.polyline([[from[1],from[0]],[to[1],to[0]]],
      {color:'#2563eb',weight:3,dashArray:'10 8',opacity:0.85}).addTo(map));
    var dist=Math.round(turf.distance(turf.point(from),turf.point(to),{units:'meters'}));
    map.fitBounds([[from[1],from[0]],[to[1],to[0]]],{padding:[60,60]});
    showToast('🧭 '+(label||'Linia prosta')+': '+dist+' m','ok');
    btnClearRoute.style.display='flex';
  }

  function clearRoute() {
    routeLayers.forEach(function(l){ map.removeLayer(l); });
    routeLayers=[]; btnClearRoute.style.display='none';
  }

  function navigateTo(destCoord) {
    clearRoute();
    var userCoord;
    if (userLat !== null) {
      userCoord = [userLng, userLat];
    } else {
      // fallback: domyślny punkt startowy z CFG.defaultStart
      userCoord = [CFG.defaultStart[1], CFG.defaultStart[0]]; // [lng, lat] dla GeoJSON/Turf
      showToast('ℹ GPS wyłączony — start z punktu domyślnego', '');
    }
    console.log('[NAV] start:', userCoord, '→ dest:', destCoord);
    console.log('[NAV] roadGraph:', roadGraph ? Object.keys(roadGraph.graph).length + ' węzłów' : 'BRAK');
    var MAX_SNAP=300;
    if (!roadGraph || !Object.keys(roadGraph.graph).length) {
      console.warn('[NAV] Brak sieci dróg – linia prosta');
      drawStraightRoute(userCoord, destCoord, 'Brak sieci – linia prosta'); return;
    }
    var uN = findNearestNode(userCoord);
    var dN = findNearestNode(destCoord);
    console.log('[NAV] nearest user node:', uN.key, 'dist:', Math.round(uN.dist)+'m');
    console.log('[NAV] nearest dest node:', dN.key, 'dist:', Math.round(dN.dist)+'m');
    if (uN.dist > MAX_SNAP || dN.dist > MAX_SNAP) {
      console.warn('[NAV] Poza siecią – linia prosta (user:'+Math.round(uN.dist)+'m, dest:'+Math.round(dN.dist)+'m)');
      drawStraightRoute(userCoord, destCoord, 'Poza siecią – linia prosta'); return;
    }
    var path = dijkstra(uN.key, dN.key);
    console.log('[NAV] dijkstra path:', path ? path.length + ' punktów' : 'null');
    if (!path || path.length < 1) {
      console.warn('[NAV] Sieć nieciągła – linia prosta');
      drawStraightRoute(userCoord, destCoord, 'Sieć nieciągła – linia prosta'); return;
    }
    // Odcinek dojścia: użytkownik → wejście na sieć
    var startLL = [userCoord[1], userCoord[0]];   // [lat,lng] dla Leaflet
    var uNLL    = [uN.coord[1], uN.coord[0]];
    var dNLL    = [dN.coord[1], dN.coord[0]];
    var destLL  = [destCoord[1], destCoord[0]];
    if (uN.dist > 3)
      routeLayers.push(L.polyline([startLL, uNLL], {color:'#2563eb', weight:2.5, dashArray:'7 9', opacity:0.80}).addTo(map));
    // Trasa po sieci dróg
    if (path.length >= 2) {
      var roadLatLngs = path.map(function(c){ return [c[1], c[0]]; });
      routeLayers.push(L.polyline(roadLatLngs, {color:'#2563eb', weight:5, opacity:0.92}).addTo(map));
    }
    // Odcinek dojścia: wyjście z sieci → cel
    if (dN.dist > 3)
      routeLayers.push(L.polyline([dNLL, destLL], {color:'#2563eb', weight:2.5, dashArray:'7 9', opacity:0.80}).addTo(map));
    // Dopasuj widok
    var allPts = [startLL].concat(
      path.map(function(c){ return [c[1], c[0]]; }),
      [destLL]
    );
    map.fitBounds(allPts, {padding:[60, 60]});
    var roadDist = path.length >= 2 ? turf.length(turf.lineString(path), {units:'meters'}) : 0;
    var totalDist = Math.round(uN.dist + roadDist + dN.dist);
    showToast('🧭 Trasa: ~' + totalDist + ' m', 'ok');
    btnClearRoute.style.display = 'flex';
  }

  window.handleNavigate = function(lng, lat, placeId) {
    map.closePopup();
    if (placeId) addRecentId(placeId);   // zapamiętaj nawigację z popupu
    navigateTo([lng, lat]);
  };
  btnClearRoute.addEventListener('click', clearRoute);

  async function loadRoadNetwork() {
    try {
      var res = await fetch('./drogi.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var geojson = await res.json();
      roadGraph = buildRoadGraph(geojson);
      var nodeCount = Object.keys(roadGraph.graph).length;
      console.log('[ROAD] Sieć załadowana:', nodeCount, 'węzłów w grafie');
    } catch(e) {
      console.error('[ROAD] Błąd ładowania sieci dróg:', e.message);
      showToast('⚠ Brak mapy dróg: ' + e.message, 'err');
    }
  }

  // ════════════════════════════════════════════════════════════════════
  //  STARTUP
  // ════════════════════════════════════════════════════════════════════
  (async function init() {
    await loadRoadNetwork();
    await initFields();
    await loadPlaces();
    if (searchPanel.classList.contains('show')) renderSearchResults(searchInput.value);

    // ── Deep link: otwórz miejsce z URL jeśli ?id= jest obecny ──────
    var deepId = getDeepLinkId();
    if (deepId) {
      var target = allPlaces.find(function(p) { return p.id === deepId; });
      if (target && placeMarkers[target.id]) {
        // Wycentruj i otwórz popup — bez animacji żeby było szybkie
        map.setView([target.lat, target.lng], 19, { animate: false });
        setTimeout(function() {
          if (placeMarkers[target.id]) {
            placeMarkers[target.id].openPopup();
          }
        }, 350);
      } else {
        // ID w URL nie pasuje do żadnego miejsca
        clearDeepLink();
        showToast('⚠ Nie znaleziono miejsca z tego linku', 'err');
      }
    }
  })();
  </script>
</body>

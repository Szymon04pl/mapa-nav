<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no" />
  <title>Mapa</title>

  <!-- ╔══════════════════════════════════════════════════════════════════╗
       ║  LEAFLET — CDN (wymień na pliki lokalne dla trybu OFFLINE):      ║
       ║                                                                  ║
       ║  1. Pobierz leaflet.css → umieść obok mapa.html                 ║
       ║     Zmień href na:  "./leaflet.css"                              ║
       ║                                                                  ║
       ║  2. Pobierz leaflet.js  → umieść obok mapa.html                 ║
       ║     Zmień src  na:  "./leaflet.js"                               ║
       ║                                                                  ║
       ║  Pobierz z:  https://leafletjs.com/download.html                ║
       ╚══════════════════════════════════════════════════════════════════╝ -->
   <link rel="stylesheet"
        href="./leaflet.css" />
  <script src="./leaflet.js"></script>

  <style>
    /* ─── RESET & BASE ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Helvetica Neue', Arial, sans-serif;
      background: #0f172a;
    }

    /* ─── MAPA ─── */
    #map {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: #1e293b;
    }

    /* ─── PASEK STATUSU ─── */
    #status-bar {
      position: fixed;
      top: env(safe-area-inset-top, 16px);
      top: max(env(safe-area-inset-top, 0px), 16px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(15, 23, 42, 0.80);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 999px;
      padding: 9px 18px 9px 14px;
      color: #e2e8f0;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.015em;
      white-space: nowrap;
      max-width: 92vw;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.40);
      transition: background 0.3s;
    }

    /* Wskaźnik stanu */
    #status-dot {
      flex-shrink: 0;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #475569;
      transition: background 0.3s;
    }
    #status-bar.tracking  #status-dot { background: #3b82f6; animation: blink 1.6s ease-in-out infinite; }
    #status-bar.error     #status-dot { background: #ef4444; }
    #status-bar.locating  #status-dot { background: #f59e0b; animation: blink 0.7s ease-in-out infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ─── PRZYCISKI ─── */
    #controls {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom, 0px), 28px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.2s ease, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn:active  { transform: scale(0.94); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* Główny przycisk GPS */
    #btn-locate {
      padding: 15px 30px;
      font-size: 16px;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 6px 28px rgba(37, 99, 235, 0.50);
    }
    #btn-locate:not(:disabled):hover {
      box-shadow: 0 8px 32px rgba(37, 99, 235, 0.65);
    }

    /* Przycisk "Centruj" */
    #btn-center {
      padding: 11px 22px;
      font-size: 13px;
      color: #e2e8f0;
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
      display: none;
    }

    /* Przycisk "Stop" */
    #btn-stop {
      padding: 11px 22px;
      font-size: 13px;
      color: #fecaca;
      background: rgba(127, 29, 29, 0.80);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(239, 68, 68, 0.30);
      box-shadow: 0 4px 18px rgba(0,0,0,0.30);
      display: none;
    }

    /* ─── NIEBIESKA KROPKA GPS ─── */
    .gps-wrapper {
      position: relative;
      width: 24px; height: 24px;
    }
    .gps-dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 16px; height: 16px;
      background: #2563eb;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 2px 10px rgba(37, 99, 235, 0.55);
      z-index: 2;
    }
    .gps-pulse {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(37, 99, 235, 0.40);
      z-index: 1;
      animation: pulse-ring 2.2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: translate(-50%,-50%) scale(0.8); opacity: 0.9; }
      70%  { transform: translate(-50%,-50%) scale(3.0); opacity: 0;   }
      100% { transform: translate(-50%,-50%) scale(3.0); opacity: 0;   }
    }

    /* ─── IKONA ŁADOWANIA ─── */
    .spin {
      animation: spin 0.9s linear infinite;
      display: inline-block;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── LEAFLET OVERRIDES ─── */
    .leaflet-control-attribution {
      font-size: 9px !important;
      background: rgba(15, 23, 42, 0.72) !important;
      color: #64748b !important;
      border-radius: 6px 0 0 0 !important;
    }
    .leaflet-control-attribution a { color: #94a3b8 !important; }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35) !important;
    }
    .leaflet-control-zoom a {
      background: rgba(15, 23, 42, 0.82) !important;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #e2e8f0 !important;
      border: 1px solid rgba(255,255,255,0.10) !important;
      font-size: 18px !important;
      line-height: 30px !important;
      width: 34px !important; height: 34px !important;
    }
    .leaflet-control-zoom a:hover {
      background: rgba(30, 41, 59, 0.95) !important;
    }
    .leaflet-bar a:first-child { border-radius: 12px 12px 0 0 !important; }
    .leaflet-bar a:last-child  { border-radius: 0 0 12px 12px !important; }
  </style>
</head>

<body>

  <!-- ── Pasek statusu ── -->
  <div id="status-bar">
    <span id="status-dot"></span>
    <span id="status-text">Gotowy do namierzenia</span>
  </div>

  <!-- ── Mapa ── -->
  <div id="map"></div>

  <!-- ── Przyciski sterowania ── -->
  <div id="controls">

    <button class="btn" id="btn-locate">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13
                 c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5" fill="white" stroke="none"/>
      </svg>
      Gdzie jestem?
    </button>

    <button class="btn" id="btn-center">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
      </svg>
      Centruj na mnie
    </button>

    <button class="btn" id="btn-stop">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
      Zatrzymaj śledzenie
    </button>

  </div>

  <script>
    // ╔══════════════════════════════════════════════════════════════════╗
    // ║  KONFIGURACJA — dostosuj do swojej mapy                         ║
    // ╚══════════════════════════════════════════════════════════════════╝
    const CFG = {
      // Plik obrazu mapy — umieść obok mapa.html (lub podaj pełną ścieżkę)
      imageFile: 'mapa.jpg',

      // Geograficzne narożniki obrazu:
      //   [[lat_PD-Zachód, lng_PD-Zachód], [lat_PN-Wschód, lng_PD-Wschód]]
      // ► Zmień na rzeczywiste współrzędne swojego miejsca! ◄
      imageBounds: [
        [52.88558397616913, 21.095088771320196],   // Południowo-Zachodni narożnik // dolny lewy
        [52.885740562673064, 21.095582968312566],   // Północno-Wschodni narożnik // górny prawy
      ],

      // Przezroczystość nałożonego obrazu (0.0 – 1.0)
      imageOpacity: 1.0,
    };
    // ══════════════════════════════════════════════════════════════════

    /* ── Inicjalizacja mapy ── */
    const map = L.map('map', {
      center: [
        (CFG.imageBounds[0][0] + CFG.imageBounds[1][0]) / 2,
        (CFG.imageBounds[0][1] + CFG.imageBounds[1][1]) / 2,
      ],
      zoom: 15,
      zoomControl: true,
      attributionControl: true,
    });

    // ──────────────────────────────────────────────────────────────────
    // WARSTWA BAZOWA — wybierz jedną z opcji:
    //
    // ► OPCJA A (aktywna): własny obraz jako mapa główna (ImageOverlay)
    // ► OPCJA B: kafelki OpenStreetMap — odkomentuj blok poniżej
    // ──────────────────────────────────────────────────────────────────

    // OPCJA A — ImageOverlay (własne zdjęcie)
    const imgLayer = L.imageOverlay(CFG.imageFile, CFG.imageBounds, {
      opacity: CFG.imageOpacity,
      attribution: 'Mapa własna',
      interactive: false,
    }).addTo(map);

    // Dopasuj widok do granic obrazu (po załadowaniu i jako fallback)
    imgLayer.on('load', () => map.fitBounds(CFG.imageBounds, { padding: [24, 24] }));
    map.fitBounds(CFG.imageBounds, { padding: [24, 24] });

    // OPCJA B — OpenStreetMap (odkomentuj aby używać zamiast lub razem z OPCJĄ A)
    // L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    //   attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    //   maxZoom: 19,
    // }).addTo(map);

    // ──────────────────────────────────────────────────────────────────
    // DODATKOWE NAKŁADKI (np. siatka podziału, obrysy budynków itp.)
    // Można dodać kolejne warstwy L.imageOverlay lub L.geoJSON tutaj
    // ──────────────────────────────────────────────────────────────────


    /* ── Stan GPS ── */
    let watchId   = null;
    let userLat   = null;
    let userLng   = null;
    let gpsMarker = null;
    let accCircle = null;

    /* ── Elementy DOM ── */
    const statusBar  = document.getElementById('status-bar');
    const statusDot  = document.getElementById('status-dot');   // nie używane bezpośrednio
    const statusText = document.getElementById('status-text');
    const btnLocate  = document.getElementById('btn-locate');
    const btnCenter  = document.getElementById('btn-center');
    const btnStop    = document.getElementById('btn-stop');

    /* ── Pomocnik statusu ── */
    function setStatus(state, text) {
      statusBar.className = state;          // 'idle' | 'locating' | 'tracking' | 'error'
      statusText.textContent = text;
    }

    /* ── Ikona niebieskiej kropki GPS ── */
    const gpsIcon = L.divIcon({
      className: '',
      html: '<div class="gps-wrapper"><div class="gps-pulse"></div><div class="gps-dot"></div></div>',
      iconSize:   [24, 24],
      iconAnchor: [12, 12],
      popupAnchor:[0, -14],
    });

    /* ── Aktualizacja pozycji na mapie ── */
    function updateMarker(lat, lng, accuracy) {
      userLat = lat;
      userLng = lng;

      const latlng = [lat, lng];

      if (gpsMarker) {
        // Przesuń istniejący marker i okrąg dokładności
        gpsMarker.setLatLng(latlng);
        accCircle.setLatLng(latlng).setRadius(accuracy);
      } else {
        // Pierwsza pozycja — utwórz marker + okrąg + wyśrodkuj
        gpsMarker = L.marker(latlng, { icon: gpsIcon, zIndexOffset: 1000 }).addTo(map);
        accCircle = L.circle(latlng, {
          radius:      accuracy,
          color:       '#2563eb',
          weight:      1.5,
          fillColor:   '#93c5fd',
          fillOpacity: 0.15,
        }).addTo(map);

        map.setView(latlng, 17);

        // Pokaż przyciski pomocnicze
        btnCenter.style.display = 'flex';
        btnStop.style.display   = 'flex';
      }

      // Opis dokładności
      const accStr = accuracy < 1000
        ? '±' + Math.round(accuracy) + ' m'
        : '±' + (accuracy / 1000).toFixed(1) + ' km';

      setStatus(
        'tracking',
        lat.toFixed(5) + ', ' + lng.toFixed(5) + '   ' + accStr
      );
    }

    /* ── Obsługa błędu GPS ── */
    const GEO_ERRORS = {
      1: 'Brak zgody na lokalizację',
      2: 'Pozycja niedostępna',
      3: 'Przekroczono czas oczekiwania',
    };
    function onGeoError(err) {
      setStatus('error', GEO_ERRORS[err.code] || err.message);
      btnLocate.disabled = false;
      resetBtnLocate();
    }

    function resetBtnLocate() {
      btnLocate.innerHTML =
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"' +
        ' stroke="currentColor" stroke-width="2.5" stroke-linecap="round">' +
        '<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13' +
        'c0-3.87-3.13-7-7-7z"/>' +
        '<circle cx="12" cy="9" r="2.5" fill="white" stroke="none"/>' +
        '</svg>Gdzie jestem?';
    }

    /* ── Przycisk "Gdzie jestem?" ── */
    btnLocate.addEventListener('click', () => {
      if (!navigator.geolocation) {
        setStatus('error', 'Geolokalizacja nieobsługiwana');
        return;
      }

      // Zatrzymaj poprzednie śledzenie
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      btnLocate.disabled = true;
      btnLocate.innerHTML =
        '<span class="spin">' +
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"' +
        ' stroke="currentColor" stroke-width="2.5">' +
        '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>' +
        '</svg></span> Namierzam…';
      setStatus('locating', 'Namierzam pozycję…');

      // Jednorazowy fix GPS…
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          updateMarker(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
          btnLocate.disabled = false;
          resetBtnLocate();

          // …a potem ciągłe śledzenie (watchPosition)
          watchId = navigator.geolocation.watchPosition(
            function(p) {
              updateMarker(p.coords.latitude, p.coords.longitude, p.coords.accuracy);
            },
            onGeoError,
            { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
          );
        },
        onGeoError,
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    });

    /* ── Przycisk "Centruj na mnie" ── */
    btnCenter.addEventListener('click', () => {
      if (userLat !== null) {
        map.setView([userLat, userLng], map.getZoom(), { animate: true });
      }
    });

    /* ── Przycisk "Zatrzymaj śledzenie" ── */
    btnStop.addEventListener('click', () => {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      btnCenter.style.display = 'none';
      btnStop.style.display   = 'none';
      setStatus('idle', 'Śledzenie zatrzymane');
    });

  </script>
</body>
</html>
